<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFL Cards – Pack Opening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black:  #0e0e0f; --dark: #161618; --panel: #1c1c1f;
    --border: #2e2e33; --silver: #8a8a96;
    --red:    #c0201a; --gold: #c8980a;
    --muted:  #5a5a66; --text: #e8e8ec; --white: #f4f4f6;
    --c-color: #6a6a76; --u-color: #3a7abf; --r-color: #9b42d6; --sr-color: #c8980a;
  }
  html, body { background: var(--black); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  nav {
    background: var(--dark); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 1.5rem;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-logo {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.2rem;
    letter-spacing: 0.14em; color: var(--white); text-transform: uppercase;
    margin-right: 2rem; padding: 1rem 0; text-decoration: none;
  }
  .nav-logo span { color: var(--red); }
  .nav-tab {
    padding: 1rem 1.1rem; font-size: 0.72rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); text-decoration: none;
    border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--white); border-bottom-color: var(--red); }

  .screen { display: none; }
  .screen.active { display: block; }



  /* ── PACK SELECT ── */
  .pack-select-screen { max-width: 960px; margin: 0 auto; padding: 2.5rem 1.25rem 3rem; }
  .page-eyebrow { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
  .page-title {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
    font-size: clamp(1.8rem, 5vw, 2.6rem); text-transform: uppercase;
    letter-spacing: 0.04em; color: var(--white); margin-bottom: 2rem; line-height: 1;
  }
  .page-title span { color: var(--red); }

  .pack-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }

  .pack-card {
    background: var(--panel); border: 1.5px solid var(--border);
    border-radius: 12px; overflow: hidden; cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  .pack-card:hover { transform: translateY(-4px); border-color: var(--red); box-shadow: 0 8px 30px rgba(192,32,26,0.25); }

  .pack-card-img {
    width: 100%; aspect-ratio: 3/4; overflow: hidden;
    background: var(--dark); display: flex; align-items: center; justify-content: center;
  }
  .pack-card-img img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .pack-card-img .no-img {
    font-size: 0.7rem; color: var(--muted); text-align: center; padding: 1rem;
    font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.08em; text-transform: uppercase;
  }

  .pack-card-info { padding: 12px 14px 14px; }
  .pack-card-name {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 1rem; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--white); margin-bottom: 3px;
  }
  .pack-card-sub { font-size: 0.72rem; color: var(--muted); margin-bottom: 8px; }
  .pack-card-counts { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }

  .rarity-pip {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 4px;
  }
  .rarity-pip.c  { background: rgba(106,106,118,0.2); color: var(--c-color);  border: 1px solid rgba(106,106,118,0.3); }
  .rarity-pip.u  { background: rgba(58,122,191,0.15);  color: var(--u-color);  border: 1px solid rgba(58,122,191,0.3);  }
  .rarity-pip.r  { background: rgba(155,66,214,0.15);  color: var(--r-color);  border: 1px solid rgba(155,66,214,0.3);  }
  .rarity-pip.sr { background: rgba(200,152,10,0.15);  color: var(--sr-color); border: 1px solid rgba(200,152,10,0.4);  }

  .pack-card-empty {
    font-size: 0.68rem; color: var(--muted); font-style: italic; margin-bottom: 8px;
  }

  .pack-open-btn {
    display: block; width: 100%;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 0.82rem; letter-spacing: 0.12em; text-transform: uppercase;
    background: var(--red); color: var(--white); border: none; border-radius: 6px;
    padding: 0.55rem 0; cursor: pointer; transition: background 0.12s;
  }
  .pack-open-btn:hover { background: #d8251e; }
  .pack-open-btn:disabled { background: #2a2a2e; color: var(--muted); cursor: default; }

  /* ── PACK OPEN ── */
  .pack-open-screen {
    min-height: calc(100vh - 57px); display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem 1rem;
  }
  .pack-img-wrap {
    width: min(260px, 68vw); cursor: pointer; user-select: none;
  }
  .pack-img-wrap img {
    width: 100%; display: block; object-fit: contain;
    filter: drop-shadow(0 8px 32px rgba(192,32,26,0.25));
    transition: transform 0.2s, filter 0.2s;
  }
  .pack-img-wrap:hover img { transform: scale(1.025) translateY(-4px); filter: drop-shadow(0 14px 40px rgba(192,32,26,0.4)); }
  .pack-img-wrap.ripping img { animation: packRip 0.6s forwards; }
  @keyframes packRip {
    0%   { transform: scale(1) rotate(0); opacity: 1; }
    30%  { transform: scale(1.06) rotate(-2deg); }
    60%  { transform: scale(0.9) rotate(4deg); opacity: 0.7; }
    100% { transform: scale(0.3) translateY(-100px) rotate(-12deg); opacity: 0; }
  }
  .pack-open-meta { text-align: center; margin: 1.5rem 0 1.75rem; }
  .pack-open-meta-name {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
    font-size: clamp(1.6rem, 5vw, 2.4rem); text-transform: uppercase;
    letter-spacing: 0.04em; color: var(--white); line-height: 1; margin-bottom: 0.25rem;
  }
  .pack-open-meta-name span { color: var(--red); }
  .pack-open-meta-sub { font-size: 0.78rem; color: var(--muted); }
  .btn-open {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.05rem;
    letter-spacing: 0.16em; text-transform: uppercase;
    background: var(--red); color: var(--white); border: none; border-radius: 6px;
    padding: 0.75rem 3rem; cursor: pointer;
    transition: background 0.12s, transform 0.1s;
    box-shadow: 0 4px 18px rgba(192,32,26,0.35);
  }
  .btn-open:hover { background: #d8251e; transform: translateY(-2px); }
  .btn-open:active { transform: translateY(0); }
  .btn-open:disabled { background: #2a2a2e; color: var(--muted); cursor: default; transform: none; box-shadow: none; }
  .btn-back-link {
    font-size: 0.72rem; color: var(--muted); text-decoration: none; letter-spacing: 0.06em;
    margin-top: 0.75rem; display: block; text-align: center; transition: color 0.12s; cursor: pointer;
  }
  .btn-back-link:hover { color: var(--text); }

  /* ── REVEAL ── */
  .reveal-screen {
    min-height: calc(100vh - 57px); display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 1.5rem 1rem;
  }
  .pip-row { display: flex; gap: 9px; margin-bottom: 1.25rem; }
  .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.2s; }
  .pip.revealed { background: var(--silver); }
  .pip.current  { background: var(--red); box-shadow: 0 0 0 2px var(--black), 0 0 0 3.5px var(--red); }

  .rarity-banner {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
    font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
    padding: 4px 16px; border-radius: 4px; margin-bottom: 10px; display: inline-block;
  }
  .rarity-banner.c  { background: rgba(106,106,118,0.2); color: var(--c-color);  border: 1px solid rgba(106,106,118,0.3); }
  .rarity-banner.u  { background: rgba(58,122,191,0.15);  color: var(--u-color);  border: 1px solid rgba(58,122,191,0.3);  }
  .rarity-banner.r  { background: rgba(155,66,214,0.2);   color: var(--r-color);  border: 1px solid rgba(155,66,214,0.4);  }
  .rarity-banner.sr { background: rgba(200,152,10,0.2);   color: var(--sr-color); border: 1px solid rgba(200,152,10,0.5); animation: srPulse 1.5s ease-in-out infinite; }
  @keyframes srPulse { 0%,100% { box-shadow: 0 0 6px rgba(200,152,10,0.3); } 50% { box-shadow: 0 0 18px rgba(200,152,10,0.7); } }

  .big-card {
    border-radius: 12px; overflow: hidden; border: 2px solid var(--border); position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6); animation: cardReveal 0.5s cubic-bezier(0.22,1,0.36,1);
    margin-bottom: 1.25rem;
  }
  .big-card.portrait  { width: min(240px, 68vw); aspect-ratio: 5/7; }
  .big-card.landscape { width: min(400px, 88vw); aspect-ratio: 7/5; }
  .big-card.team-gb { border-color: #2d7a3a; box-shadow: 0 8px 40px rgba(45,122,58,0.3); }
  .big-card.team-qc { border-color: #aa2222; box-shadow: 0 8px 40px rgba(170,34,34,0.3); }
  .big-card.rarity-r  { border-color: #9b42d6; box-shadow: 0 8px 40px rgba(155,66,214,0.35); }
  .big-card.rarity-sr { border-color: var(--gold); animation: cardReveal 0.5s cubic-bezier(0.22,1,0.36,1), srCardPulse 2s ease-in-out 0.5s infinite; }
  @keyframes srCardPulse { 0%,100% { box-shadow: 0 0 0 1px var(--gold), 0 8px 50px rgba(200,152,10,0.5); } 50% { box-shadow: 0 0 0 2px var(--gold), 0 8px 60px rgba(200,152,10,0.8); } }
  @keyframes cardReveal { from { transform: rotateY(-90deg) scale(0.85); opacity: 0; } to { transform: rotateY(0deg) scale(1); opacity: 1; } }

  .big-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .big-card-label {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 40px 12px 10px;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
    font-family: 'Barlow Condensed', sans-serif; text-align: center;
  }
  .big-card-name { font-size: 1rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #fff; }
  .big-card-team { font-size: 0.72rem; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-top: 2px; }

  .btn-next {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1rem;
    letter-spacing: 0.14em; text-transform: uppercase;
    background: var(--red); color: var(--white); border: none; border-radius: 6px;
    padding: 0.65rem 2.25rem; cursor: pointer; transition: background 0.12s, transform 0.1s;
    box-shadow: 0 4px 16px rgba(192,32,26,0.3);
  }
  .btn-next:hover { background: #d8251e; transform: translateY(-1px); }
  .btn-next:active { transform: translateY(0); }
  .btn-next.collect { background: var(--gold); box-shadow: 0 4px 16px rgba(200,152,10,0.4); }
  .btn-next.collect:hover { background: #dba80c; }

  .seen-strip { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 1.25rem; padding: 0 1rem; }
  .seen-thumb {
    border-radius: 6px; overflow: hidden; border: 1.5px solid var(--border);
    opacity: 0.4; transition: opacity 0.2s, border-color 0.2s; background: var(--panel); flex-shrink: 0;
  }
  .seen-thumb.portrait  { width: 44px; height: 61px; }
  .seen-thumb.landscape { width: 66px; height: 47px; }
  .seen-thumb.revealed  { opacity: 0.6; }
  .seen-thumb.active-thumb { opacity: 1; border-color: var(--red); }
  .seen-thumb.rarity-r  { border-color: #9b42d6 !important; }
  .seen-thumb.rarity-sr { border-color: var(--gold) !important; }
  .seen-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(4rem);
    background: var(--panel); border: 1px solid var(--red);
    color: var(--white); font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.6rem 1.75rem; border-radius: 6px; opacity: 0;
    transition: transform 0.3s, opacity 0.3s; z-index: 200; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  footer { border-top: 1px solid var(--border); text-align: center; padding: 1.25rem; font-size: 0.7rem; color: var(--muted); }
</style>
</head>

<nav>
  <a href="index.html" class="nav-logo"><span>IFL</span> Cards</a>

<!-- PACK SELECT -->
<div class="screen active" id="screen-select">
  <div class="pack-select-screen">
    <div class="page-eyebrow">Indoor Football Index</div>
    <div class="page-title">Choose a <span>Pack</span></div>
    <div class="pack-grid" id="packGrid">
      <div style="color:var(--muted);font-size:0.85rem;padding:1rem 0;">Loading packs…</div>

  </div>
</div>

<!-- PACK OPEN -->
<div class="screen" id="screen-open">
  <div class="pack-open-screen">
    <div class="pack-img-wrap" id="packWrap">
      <img src="" alt="Pack" id="packImg">
    </div>
    <div class="pack-open-meta">
      <div class="pack-open-meta-name" id="packOpenName"></div>
      <div class="pack-open-meta-sub" id="packOpenSub">5 cards per pack · guaranteed rare or better</div>
    </div>
    <button class="btn-open" id="openBtn" onclick="startOpen()">Open Pack</button>
    <a class="btn-back-link" onclick="showScreen('select')">← Back to packs</a>
  </div>
</div>

<!-- REVEAL -->
<div class="screen" id="screen-reveal">
  <div class="reveal-screen">
    <div class="pip-row" id="pipRow"></div>
    <div class="rarity-banner c" id="rarityBanner">Common</div>
    <div class="big-card portrait" id="bigCard">
      <img id="bigCardImg" src="" alt="">
      <div class="big-card-label">
        <div class="big-card-name" id="bigCardName"></div>
        <div class="big-card-team" id="bigCardTeam"></div>
      </div>
    </div>
    <button class="btn-next" id="nextBtn" onclick="nextCard()">Next Card →</button>
    <div class="seen-strip" id="seenStrip"></div>
  </div>
</div>

<footer>Indoor Football Index &copy; 2025 · IFL Cards</footer>
<div class="toast" id="toast"></div>

<script>
const RARITY_LABELS = { c: 'Common', u: 'Uncommon', r: 'Rare', sr: 'Secret Rare' };

// ── STORAGE ──
function saveCollectionLocal(col) {
  const str = JSON.stringify(col);
  sessionStorage.setItem('ifiCol', str);
  try { document.cookie = 'ifiCol=' + encodeURIComponent(str) + '; path=/; max-age=31536000'; } catch(e) {}
}
function loadCollectionLocal() {
  let s = sessionStorage.getItem('ifiCol');
  if (s) { try { return JSON.parse(s); } catch(e) {} }
  try {
    const match = document.cookie.split(';').find(c => c.trim().startsWith('ifiCol='));
    if (match) return JSON.parse(decodeURIComponent(match.split('=')[1]));
  } catch(e) {}
  return [];
}

// ── STATE ──
let PACK_DEFS = [];
let currentPack = null;
let packCards = [];
let cardIndex = 0;

// ── SCREEN ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// ── PACK DATA (LOCAL) ──
// Loaded from packs.js, which is generated by build.py from the CSVs.
// To update: edit packs/packs.csv or packs/<id>/cards.csv, then run:
//   python build.py
// packs.js is then loaded via <script src="packs.js"> in the <head>.

function loadPacks() {
  // LOCAL: packs.js sets window.PACK_DATA — loaded via <script src="packs.js">
  if (window.PACK_DATA) {
    PACK_DEFS = window.PACK_DATA;
    buildPackGrid();
    return;
  }
  document.getElementById('packGrid').innerHTML =
    '<div style="color:var(--muted);font-size:0.85rem;line-height:1.8;">' +
    'packs.js not found.<br>Run <code style="color:var(--u-color)">python build.py</code> to generate it.' +
    '</div>';
}

// ════════════════════════════════════════════════════════════
// CLOUDFLARE / LIVE VERSION — swap this in when hosted
// Replace the loadPacks() function above with this block,
// and remove the <script src="packs.js"> tag from the <head>.
// ════════════════════════════════════════════════════════════

  }

  try {

    }));

  }
}
*/
// ════════════════════════════════════════════════════════════

// ── PACK GRID ──
function buildPackGrid() {
  const grid = document.getElementById('packGrid');
  grid.innerHTML = '';
  if (!PACK_DEFS.length) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;">No packs found in packs.json.</div>';
    return;
  }
  PACK_DEFS.forEach(pack => {
    const rarCounts = {};
    (pack.cards || []).forEach(c => { rarCounts[c.rarity] = (rarCounts[c.rarity] || 0) + 1; });
    const hasCards = pack.cards && pack.cards.length > 0;

    const el = document.createElement('div');
    el.className = 'pack-card';

    // Image area — use onerror to show fallback text if pack.png missing
    const imgWrap = document.createElement('div');
    imgWrap.className = 'pack-card-img';
    const img = document.createElement('img');
    img.src = 'packs/' + pack.id + '/pack.png';
    img.alt = pack.name;
    img.onerror = function() {
      imgWrap.innerHTML = '<div class="no-img">' + pack.name + '<br>No artwork yet</div>';
    };
    imgWrap.appendChild(img);

    const info = document.createElement('div');
    info.className = 'pack-card-info';
    info.innerHTML = `
      <div class="pack-card-name">${pack.name}</div>
      <div class="pack-card-sub">${pack.sub || ''}</div>
      <div class="pack-card-counts">
        ${rarCounts.c  ? `<span class="rarity-pip c">${rarCounts.c}C</span>`   : ''}
        ${rarCounts.u  ? `<span class="rarity-pip u">${rarCounts.u}U</span>`   : ''}
        ${rarCounts.r  ? `<span class="rarity-pip r">${rarCounts.r}R</span>`   : ''}
        ${rarCounts.sr ? `<span class="rarity-pip sr">${rarCounts.sr}SR</span>` : ''}
      </div>
      ${!hasCards ? '<div class="pack-card-empty">No cards yet — add cards to packs.json</div>' : ''}
    `;

    const btn = document.createElement('button');
    btn.className = 'pack-open-btn';
    btn.textContent = 'Open This Pack';
    btn.disabled = !hasCards;
    btn.onclick = () => selectPack(pack.id);
    info.appendChild(btn);

    el.appendChild(imgWrap);
    el.appendChild(info);
    grid.appendChild(el);
  });
}

// ── SELECT & OPEN ──
function selectPack(id) {
  currentPack = PACK_DEFS.find(p => p.id === id);
  if (!currentPack) return;

  const packImg = document.getElementById('packImg');
  packImg.src = 'packs/' + id + '/pack.png';
  packImg.onerror = function() { this.style.display = 'none'; };
  packImg.onload  = function() { this.style.display = ''; };

  // Format name: split on camelCase or spaces for display
  document.getElementById('packOpenName').textContent = currentPack.name;
  document.getElementById('packOpenSub').textContent = currentPack.sub || '5 cards per pack · guaranteed rare or better';

  const wrap = document.getElementById('packWrap');
  wrap.classList.remove('ripping');
  packImg.style.animation = 'none';
  void packImg.offsetWidth;
  packImg.style.animation = '';

  document.getElementById('openBtn').disabled = false;
  document.getElementById('openBtn').textContent = 'Open Pack';
  showScreen('open');
}

function startOpen() {
  if (!currentPack || !currentPack.cards.length) return;
  document.getElementById('openBtn').disabled = true;
  document.getElementById('packWrap').classList.add('ripping');
  setTimeout(() => {
    packCards = pullPack(currentPack);
    cardIndex = 0;
    buildRevealUI();
    showCard(0);
    showScreen('reveal');
  }, 580);
}

// ── PULL LOGIC ──
// Slots 1-3: commons | Slot 4: uncommon | Slot 5: SR (1/1000) or rare
function pullPack(pack) {
  const byRarity = { c: [], u: [], r: [], sr: [] };
  pack.cards.forEach(c => { if (byRarity[c.rarity]) byRarity[c.rarity].push(c); });

  function pick(pool) { return pool.length ? pool[Math.floor(Math.random() * pool.length)] : null; }
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a;
  }

  const slot5 = (byRarity.sr.length && Math.random() < 1/1000)
    ? pick(byRarity.sr)
    : (pick(byRarity.r) || pick(byRarity.u) || pick(byRarity.c));

  const slot4 = pick(byRarity.u) || pick(byRarity.c);

  const commonPool = shuffle(byRarity.c.length ? byRarity.c : pack.cards);
  const slots123 = [0,1,2].map(i => commonPool[i % commonPool.length]);

  return [...slots123, slot4, slot5].filter(Boolean);
}

// ── REVEAL ──
function buildRevealUI() {
  const pipRow = document.getElementById('pipRow');
  pipRow.innerHTML = '';
  packCards.forEach((_, i) => {
    const pip = document.createElement('div');
    pip.className = 'pip'; pip.id = 'pip' + i;
    pipRow.appendChild(pip);
  });
  const strip = document.getElementById('seenStrip');
  strip.innerHTML = '';
  packCards.forEach((card, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'seen-thumb ' + (card.landscape ? 'landscape' : 'portrait');
    thumb.id = 'thumb' + i;
    strip.appendChild(thumb);
  });
}

function showCard(idx) {
  const card = packCards[idx];
  const orient = card.landscape ? 'landscape' : 'portrait';

  document.getElementById('bigCardImg').src = 'packs/' + currentPack.id + '/' + card.file;
  document.getElementById('bigCardImg').alt = card.name;
  document.getElementById('bigCardName').textContent = card.name;
  document.getElementById('bigCardTeam').textContent = card.team || '';

  const banner = document.getElementById('rarityBanner');
  banner.textContent = RARITY_LABELS[card.rarity] || card.rarity;
  banner.className = 'rarity-banner ' + card.rarity;

  const bc = document.getElementById('bigCard');
  bc.className = ['big-card', orient, 'team-' + (card.teamCode||'').toLowerCase(), 'rarity-' + card.rarity].join(' ');
  bc.style.animation = 'none';
  void bc.offsetWidth;
  bc.style.animation = card.rarity === 'sr'
    ? 'cardReveal 0.5s cubic-bezier(0.22,1,0.36,1), srCardPulse 2s ease-in-out 0.5s infinite'
    : 'cardReveal 0.5s cubic-bezier(0.22,1,0.36,1)';

  packCards.forEach((_, i) => {
    document.getElementById('pip' + i).className =
      'pip' + (i < idx ? ' revealed' : i === idx ? ' current' : '');
  });

  const thumb = document.getElementById('thumb' + idx);
  if (thumb && !thumb.querySelector('img')) {
    const ti = document.createElement('img');
    ti.src = 'packs/' + currentPack.id + '/' + card.file;
    ti.alt = card.name;
    thumb.appendChild(ti);
  }
  packCards.forEach((c, i) => {
    const t = document.getElementById('thumb' + i);
    if (!t) return;
    t.className = ['seen-thumb', c.landscape ? 'landscape' : 'portrait',
      i === idx ? 'active-thumb' : i < idx ? 'revealed' : '',
      (c.rarity === 'r' || c.rarity === 'sr') ? 'rarity-' + c.rarity : ''
    ].join(' ').trim();
  });

  const btn = document.getElementById('nextBtn');
  const isLast = idx >= packCards.length - 1;
  btn.textContent = isLast ? '✓ Add All to Collection' : 'Next Card →';
  btn.className   = isLast ? 'btn-next collect' : 'btn-next';
}

function nextCard() {
  if (cardIndex < packCards.length - 1) { cardIndex++; showCard(cardIndex); }
  else collectPack();
}

function collectPack() {
  try {
    const col = loadCollectionLocal();
    packCards.forEach(c => col.push({ ...c, packId: currentPack.id, packName: currentPack.name }));
    saveCollectionLocal(col);
  } catch(e) {
    console.error('Error saving collection locally:', e);
  }
  // save to server — non-blocking, won't break the flow if it fails
  try {
    savePullToServer(packCards.map(c => ({ ...c, packId: currentPack.id, packName: currentPack.name })));
  } catch(e) {
    console.warn('Server save skipped:', e);
  }
  const sr = packCards.find(c => c.rarity === 'sr');
  showToast(sr ? '🏆 Secret Rare! 5 cards saved.' : '5 cards added to collection');
  showScreen('select');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── INIT ──
loadPacks();
</script>
