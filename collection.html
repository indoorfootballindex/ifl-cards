<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>50 Yard Cards – My Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<script src="packs.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black:  #0a0d0a; --dark: #111410; --panel: #181c16;
    --border: #2a2e24; --silver: #8a9a80;
    --green:  #6b7c3f; --gold: #c8980a;
    --muted:  #5a6650; --text: #e8ece4; --white: #f0f0ee;
    --c-color: #6a6a76; --u-color: #3a7abf; --r-color: #9b42d6; --sr-color: #c8980a;
  }
  html,body { background:var(--black); color:var(--text); font-family:'Barlow',sans-serif; min-height:100vh; }

  nav {
    background:var(--dark); border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 1.5rem;
    position:sticky; top:0; z-index:100;
  }
  .nav-logo { display:flex; align-items:center; height:80px;
    font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:1.2rem;
    letter-spacing:0.14em; color:var(--white); text-transform:uppercase;
    margin-right:2rem; padding:1rem 0; text-decoration:none;
  }
  .nav-logo span { color:var(--green); }
  .nav-tab {
    padding:1rem 1.1rem; font-size:0.72rem; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--muted); text-decoration:none;
    border-bottom:2px solid transparent; transition:color 0.15s,border-color 0.15s;
  }
  .nav-tab:hover { color:var(--text); }
  .nav-tab.active { color:var(--white); border-bottom-color:var(--green); }

  .page-wrap { max-width:1000px; margin:0 auto; padding:2rem 1.25rem 3rem; }

  /* header */
  .coll-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:1.25rem; flex-wrap:wrap; gap:0.5rem; }
  .coll-title { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:2rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--white); }
  .coll-title span { color:var(--green); }
  .header-right { display:flex; align-items:center; gap:10px; }
  .completion {
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:1rem;
    letter-spacing:0.06em; color:var(--white);
  }
  .completion .frac-total { color:var(--muted); font-weight:400; }
  .clear-btn {
    font-family:'Barlow Condensed',sans-serif; font-size:0.7rem; letter-spacing:0.08em;
    text-transform:uppercase; background:transparent; border:1px solid #3a1a1a;
    color:#6a3a3a; border-radius:4px; padding:4px 12px; cursor:pointer; transition:all 0.12s;
  }
  .clear-btn:hover { border-color:#aa2a2a; color:#cc4444; }

  /* progress bar */
  .progress-bar-wrap { height:4px; background:var(--border); border-radius:2px; margin-bottom:1.5rem; overflow:hidden; }
  .progress-bar-fill { height:100%; background:var(--green); border-radius:2px; transition:width 0.4s; }

  /* stats */
  .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(90px,1fr)); gap:10px; margin-bottom:1.5rem; }
  .stat-box { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:10px 12px; text-align:center; }
  .stat-n { display:block; font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:1.5rem; line-height:1; }
  .stat-n.total  { color:var(--white); }
  .stat-n.comm   { color:var(--c-color); }
  .stat-n.unco   { color:var(--u-color); }
  .stat-n.rare   { color:var(--r-color); }
  .stat-n.srare  { color:var(--sr-color); }
  .stat-lbl { display:block; font-size:0.6rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-top:3px; }

  /* filter rows */
  .filter-section { margin-bottom:1rem; }
  .filter-label { font-size:0.62rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--muted); margin-bottom:6px; }
  .filter-row { display:flex; gap:6px; flex-wrap:wrap; }
  .filter-btn {
    font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:0.68rem;
    letter-spacing:0.08em; text-transform:uppercase; padding:4px 12px;
    border-radius:20px; border:1px solid var(--border); background:transparent;
    color:var(--muted); cursor:pointer; transition:all 0.12s;
  }
  .filter-btn:hover { border-color:var(--silver); color:var(--text); }
  .filter-btn.on { background:var(--panel); border-color:var(--green); color:var(--white); }
  .filter-btn.on-c  { background:rgba(106,106,118,0.2); border-color:var(--c-color);  color:var(--c-color); }
  .filter-btn.on-u  { background:rgba(58,122,191,0.15);  border-color:var(--u-color);  color:var(--u-color); }
  .filter-btn.on-r  { background:rgba(155,66,214,0.15);  border-color:var(--r-color);  color:var(--r-color); }
  .filter-btn.on-sr { background:rgba(200,152,10,0.15);  border-color:var(--sr-color); color:var(--sr-color); }

  /* card grid */
  .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:12px; align-items:start; }

  .section-label {
    grid-column:1/-1; font-family:'Barlow Condensed',sans-serif; font-weight:700;
    font-size:0.68rem; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--muted); padding:6px 0 4px; border-top:1px solid var(--border); margin-top:4px;
  }
  .section-label:first-child { border-top:none; margin-top:0; }

  .coll-card {
    position:relative; border-radius:10px; overflow:hidden;
    border:1.5px solid var(--border); background:var(--panel);
    cursor:pointer; transition:transform 0.15s,border-color 0.15s,box-shadow 0.15s;
  }
  .coll-card:hover { transform:translateY(-4px) scale(1.02); }
  .coll-card img { width:100%; display:block; }

  /* Rarity overlay */
  .rarity-overlay { position:absolute; inset:0; background-size:cover; background-position:center; border-radius:8px; pointer-events:none; }
  .rarity-overlay.u { background-image:url("packs/overlays/uncommon.png"); opacity:1; mix-blend-mode:hue; }
  .rarity-overlay.r { background-image:url("packs/overlays/rare.png"); opacity:1; mix-blend-mode:hue; }
  
  .coll-card.portrait  img { aspect-ratio:5/7; object-fit:cover; }
  .coll-card.landscape img { aspect-ratio:7/5; object-fit:cover; }
  .coll-card.rarity-r  { border-color:#7a30b0 !important; box-shadow:0 0 10px rgba(155,66,214,0.2); }
  .coll-card.rarity-sr { border-color:var(--gold) !important; box-shadow:0 0 14px rgba(200,152,10,0.35); }

  .card-info { display:none; /* hidden — text on artwork */ 
    position:absolute; bottom:0; left:0; right:0; padding:28px 8px 7px;
    background:linear-gradient(to top,rgba(0,0,0,0.92) 0%,transparent 100%);
    font-family:'Barlow Condensed',sans-serif; text-align:center;
  }
  .card-name { font-size:0.7rem; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:#fff; line-height:1.2; }
  .card-team { font-size:0.56rem; color:rgba(255,255,255,0.45); text-transform:uppercase; margin-top:1px; }

  .rarity-badge {
    position:absolute; top:6px; left:6px;
    font-family:'Barlow Condensed',sans-serif; font-size:0.58rem; font-weight:700;
    letter-spacing:0.06em; text-transform:uppercase; padding:2px 6px; border-radius:3px;
  }
  .rarity-badge.c  { background:rgba(0,0,0,0.7); color:var(--c-color); }
  .rarity-badge.u  { background:rgba(0,0,0,0.7); color:var(--u-color); }
  .rarity-badge.r  { background:rgba(155,66,214,0.3); color:#c07af0; }
  .rarity-badge.sr { background:rgba(200,152,10,0.3); color:var(--sr-color); }

  .dupe-badge {
    position:absolute; top:6px; right:6px;
    background:rgba(0,0,0,0.8); border:1px solid var(--border);
    color:var(--silver); font-family:'Barlow Condensed',sans-serif;
    font-size:0.6rem; font-weight:700; padding:2px 6px; border-radius:3px;
  }

  .empty-state { text-align:center; padding:4rem 1rem; color:var(--muted); grid-column:1/-1; }
  .empty-state p { font-size:0.9rem; margin-bottom:1rem; }
  .btn-go {
    display:inline-block; font-family:'Barlow Condensed',sans-serif; font-weight:700;
    font-size:0.82rem; letter-spacing:0.1em; text-transform:uppercase;
    background:var(--green); color:var(--white); border-radius:5px;
    padding:0.55rem 1.5rem; text-decoration:none; transition:background 0.12s;
  }
  .btn-go:hover { background:#7a8f4a; }

  /* lightbox */
  .lightbox {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.93); z-index:300;
    align-items:center; justify-content:center; padding:1.5rem; cursor:pointer;
  }
  .lightbox.open { display:flex; }
  .lb-inner { position:relative; cursor:default; }
  .lb-inner.portrait  { max-width:320px; width:100%; }
  .lb-inner.landscape { max-width:540px; width:100%; }
  .lb-inner img { width:100%; border-radius:14px; display:block; box-shadow:0 16px 60px rgba(0,0,0,0.8); }
  .lb-inner.rarity-r  img { border:2px solid #9b42d6; box-shadow:0 0 40px rgba(155,66,214,0.5); }
  .lb-inner.rarity-sr img { border:2px solid var(--gold); box-shadow:0 0 50px rgba(200,152,10,0.6); }
  .lb-info { margin-top:12px; text-align:center; display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; }
  .lb-name { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:1.3rem; letter-spacing:0.06em; text-transform:uppercase; color:var(--white); }
  .lb-rarity { font-family:'Barlow Condensed',sans-serif; font-size:0.72rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; padding:3px 10px; border-radius:4px; }
  .lb-rarity.c  { color:var(--c-color);  border:1px solid var(--c-color); }
  .lb-rarity.u  { color:var(--u-color);  border:1px solid var(--u-color); }
  .lb-rarity.r  { color:var(--r-color);  border:1px solid var(--r-color); }
  .lb-rarity.sr { color:var(--sr-color); border:1px solid var(--sr-color); }
  .lb-team { font-size:0.78rem; color:var(--muted); }
  .lb-close { flex-shrink:0; position:absolute; top:-14px; right:-14px; width:32px; height:32px; border-radius:50%;
    background:var(--panel); border:1px solid var(--border); color:var(--muted);
    font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:color 0.12s,border-color 0.12s;
  }
  .lb-close:hover { color:var(--green); border-color:var(--green); }

  footer { border-top:1px solid var(--border); text-align:center; padding:1.25rem; font-size:0.7rem; color:var(--muted); }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo"><img src="50ydcards.png" alt="50 Yard Cards" style="height:88px;width:auto;display:block;filter:brightness(0) invert(1);"></a>
  <a href="index.html"      class="nav-tab">Open Packs</a>
  <a href="collection.html" class="nav-tab active">My Collection</a>
  <a href="browse.html"     class="nav-tab">Browse</a>
  <a href="trivia.html"     class="nav-tab">Trivia</a>
  <a href="redeem.html"     class="nav-tab">Redeem</a>
</nav>

<main>
  <div class="page-wrap">
    <div class="coll-header">
      <div class="coll-title">My <span>Collection</span></div>
      <div class="header-right">
        <div class="completion"><span id="ownedCount">0</span><span class="frac-total"> / <span id="totalCount">0</span> cards</span></div>
        <button class="clear-btn" onclick="clearCol()">Clear all</button>
      </div>
    </div>

    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>

    <div class="stats-row">
      <div class="stat-box"><span class="stat-n total" id="sTotal">0</span><span class="stat-lbl">Collected</span></div>
      <div class="stat-box"><span class="stat-n" style="color:var(--green)" id="sPacks">0</span><span class="stat-lbl">Packs Opened</span></div>
      <div class="stat-box"><span class="stat-n comm"  id="sC">0</span><span class="stat-lbl">Common</span></div>
      <div class="stat-box"><span class="stat-n unco"  id="sU">0</span><span class="stat-lbl">Uncommon</span></div>
      <div class="stat-box"><span class="stat-n rare"  id="sR">0</span><span class="stat-lbl">Rare</span></div>
      <div class="stat-box"><span class="stat-n srare" id="sSR">0</span><span class="stat-lbl">Secret Rare</span></div>
    </div>

    <!-- FILTERS -->
    <div class="filter-section">
      <div class="filter-label">Rarity</div>
      <div class="filter-row" id="rarityFilters">
        <button class="filter-btn on" onclick="setFilter('rarity','all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('rarity','c',this)">Common</button>
        <button class="filter-btn" onclick="setFilter('rarity','u',this)">Uncommon</button>
        <button class="filter-btn" onclick="setFilter('rarity','r',this)">Rare</button>
        <button class="filter-btn" onclick="setFilter('rarity','sr',this)">Secret Rare</button>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-label">Team</div>
      <div class="filter-row" id="teamFilters">
        <button class="filter-btn on" onclick="setFilter('team','all',this)">All</button>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-label">League</div>
      <div class="filter-row" id="leagueFilters">
        <button class="filter-btn on" onclick="setFilter('league','all',this)">All</button>
      </div>
    </div>
    <div class="filter-section" style="margin-bottom:1.5rem;">
      <div class="filter-label">Pack</div>
      <div class="filter-row" id="packFilters">
        <button class="filter-btn on" onclick="setFilter('pack','all',this)">All</button>
      </div>
    </div>

    <div class="card-grid" id="cardGrid"></div>
  </div>
</main>

<footer>50 Yard Cards &copy; 2025 · IFL Cards</footer>

<div class="lightbox" id="lightbox" onclick="closeLB(event)">
  <div class="lb-inner portrait" id="lbInner">
    <button class="lb-close" onclick="closeLB()">&times;</button>
    <img id="lbImg" src="" alt="">
    <div class="rarity-overlay" id="lbOverlay" style="display:none;border-radius:14px;"></div>
    <div class="lb-info">
      <div class="lb-name" id="lbName"></div>
      <div class="lb-rarity c" id="lbRarity">Common</div>
      <div class="lb-team" id="lbTeam"></div>
    </div>
  </div>
</div>

<script>
const RARITY_LABELS = { c:'Common', u:'Uncommon', r:'Rare', sr:'Secret Rare' };

// active filters
const filters = { rarity:'all', team:'all', league:'all', pack:'all' };

// getCollection — returns local data immediately
function cardImgSrc(packId, file) {
  const isExclusive = !(window.PACK_DATA || []).some(p => p.id === packId);
  return isExclusive
    ? 'exclusive_packs/' + packId + '/' + file
    : 'packs/' + packId + '/' + file;
}

function getCollectionLocal() {
  try {
    const s = localStorage.getItem('ifiCol');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return [];
}

// fetchFromServer — updates localStorage and re-renders if data changed
async function fetchCollectionFromServer() {
  let token = null;
  try { token = localStorage.getItem('ifiToken'); } catch(e) {}
  if (!token) return;
  try {
    const res = await fetch('https://api.cards.indoorfootballindex.com/api/collection', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) return;
    const data = await res.json();
    // save packs opened from server
    if (data.packs_opened !== undefined) {
      try { localStorage.setItem('ifiPacksOpened', data.packs_opened); } catch(e) {}
    }
    const lookup = {};
    if (window.PACK_DATA) {
      window.PACK_DATA.forEach(pack => {
        (pack.cards || []).forEach(card => {
          lookup[card.file + '|' + card.rarity] = { ...card, packId: pack.id, packName: pack.name };
        });
      });
    }
    // Load exclusive card metadata saved at redeem time
    let exclusiveMeta = {};
    try { exclusiveMeta = JSON.parse(localStorage.getItem('ifiExclusiveMeta') || '{}'); } catch(e) {}

    const serverCards = data.cards.map(c => {
      const rarity = c.card_rarity || 'c';
      const base = lookup[c.card_file + '|' + rarity] || {};
      // Fall back to exclusive metadata if not in PACK_DATA
      const excKey = c.card_file + '|' + c.pack_id;
      const excMeta = exclusiveMeta[excKey] || {};
      return { ...excMeta, ...base, file: c.card_file, rarity, packId: c.pack_id, packName: c.pack_name };
    });
    localStorage.setItem('ifiCol', JSON.stringify(serverCards));
    render(); // always re-render with server data
  } catch(e) {}
}

async function getCollection() {
  return getCollectionLocal();
}

// build all unique card records from packs.js
function getAllCards() {
  if (!window.PACK_DATA) return [];
  const all = [];
  window.PACK_DATA.forEach(pack => {
    (pack.cards || []).forEach(card => {
      all.push({ ...card, packId: pack.id, packName: pack.name });
    });
  });
  return all;
}

function getTotalUnique() {
  const seen = new Set();
  getAllCards().forEach(c => seen.add(c.file + '|' + c.rarity));
  return seen.size;
}

// build dynamic filter buttons from collection
function buildFilters(col) {
  const teams   = [...new Set(col.map(c => c.team).filter(Boolean))].sort();
  const leagues = [...new Set(col.map(c => c.league).filter(Boolean))].sort();
  const packs   = [...new Set(col.map(c => c.packName).filter(Boolean))].sort();

  function makeBtn(container, value, label, filterKey) {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (filters[filterKey] === value ? ' on' : '');
    btn.textContent = label;
    btn.onclick = () => setFilter(filterKey, value, btn);
    container.appendChild(btn);
  }

  const tRow = document.getElementById('teamFilters');
  tRow.innerHTML = '';
  makeBtn(tRow, 'all', 'All', 'team');
  teams.forEach(t => makeBtn(tRow, t, t, 'team'));

  const lRow = document.getElementById('leagueFilters');
  lRow.innerHTML = '';
  makeBtn(lRow, 'all', 'All', 'league');
  leagues.forEach(l => makeBtn(lRow, l, l, 'league'));

  const pRow = document.getElementById('packFilters');
  pRow.innerHTML = '';
  makeBtn(pRow, 'all', 'All', 'pack');
  packs.forEach(p => makeBtn(pRow, p, p, 'pack'));
}

async function render() {
  const col = await getCollection();

  // count dupes — key is file+rarity since variants share filenames
  const dupeCounts = {};
  col.forEach(c => {
    const key = c.file + '|' + c.rarity;
    dupeCounts[key] = (dupeCounts[key] || 0) + 1;
  });

  // unique owned — dedupe by file+rarity
  const seen = new Set();
  const unique = [];
  col.forEach(c => {
    const key = c.file + '|' + c.rarity;
    if (!seen.has(key)) { seen.add(key); unique.push(c); }
  });

  // totals
  const totalUnique = getTotalUnique();
  const ownedUnique = unique.length;
  document.getElementById('ownedCount').textContent = ownedUnique;
  document.getElementById('totalCount').textContent  = totalUnique;
  document.getElementById('progressBar').style.width = totalUnique ? ((ownedUnique/totalUnique)*100).toFixed(1) + '%' : '0%';
  const regularPackIds = new Set((window.PACK_DATA || []).map(p => p.id));
  const regularCards = col.filter(c => regularPackIds.has(c.packId));
  document.getElementById('sTotal').textContent = regularCards.length;
  document.getElementById('sPacks').textContent = Math.floor(regularCards.length / 5);
  document.getElementById('sC').textContent  = regularCards.filter(c => c.rarity === 'c').length;
  document.getElementById('sU').textContent  = regularCards.filter(c => c.rarity === 'u').length;
  document.getElementById('sR').textContent  = regularCards.filter(c => c.rarity === 'r').length;
  document.getElementById('sSR').textContent = regularCards.filter(c => c.rarity === 'sr').length;

  buildFilters(col);

  // apply filters
  let filtered = unique;
  if (filters.rarity !== 'all') filtered = filtered.filter(c => c.rarity  === filters.rarity);
  if (filters.team   !== 'all') filtered = filtered.filter(c => c.team    === filters.team);
  if (filters.league !== 'all') filtered = filtered.filter(c => c.league  === filters.league);
  if (filters.pack   !== 'all') filtered = filtered.filter(c => c.packName === filters.pack);

  // sort by rarity: C → U → R → SR
  const rarityOrder = { c: 0, u: 1, r: 2, sr: 3 };
  filtered.sort((a, b) => (rarityOrder[a.rarity] || 0) - (rarityOrder[b.rarity] || 0));

  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <p>${col.length === 0 ? 'Your collection is empty — open some packs!' : 'No cards match these filters.'}</p>
      ${col.length === 0 ? '<a href="index.html" class="btn-go">Open Packs</a>' : ''}
    </div>`;
    return;
  }

  // group by pack
  const byPack = {};
  filtered.forEach(card => {
    const key = card.packName || 'Unknown';
    if (!byPack[key]) byPack[key] = [];
    byPack[key].push(card);
  });

  let first = true;
  Object.entries(byPack).forEach(([packName, cards]) => {
    const label = document.createElement('div');
    label.className = 'section-label' + (first ? ' first' : '');
    label.textContent = packName;
    if (first) label.style.borderTop = 'none';
    grid.appendChild(label);
    first = false;

    cards.forEach(card => {
      const orient = card.landscape ? 'landscape' : 'portrait';
      const el = document.createElement('div');
      el.className = ['coll-card', orient, 'rarity-' + card.rarity].join(' ');
      el.onclick = () => openLB(card);

      const img = document.createElement('img');
      img.src = cardImgSrc(card.packId, card.file);
      img.alt = card.name;
      img.loading = 'lazy';

      const rarBadge = document.createElement('div');
      rarBadge.className = 'rarity-badge ' + card.rarity;
      rarBadge.textContent = card.rarity.toUpperCase();

      const info = document.createElement('div');
      info.className = 'card-info';
      info.innerHTML = `<div class="card-name">${card.name}${card.position ? ' — ' + card.position : ''}</div><div class="card-team">${card.team}</div>`;

      el.appendChild(img);
      el.appendChild(rarBadge);
      el.appendChild(info);

      // rarity overlay — only if a common variant exists in the same pack
      if (card.rarity === 'u' || card.rarity === 'r') {
        const packCards = (window.PACK_DATA || []).find(p => p.id === card.packId)?.cards || [];
        const hasCommon = packCards.some(c => c.file === card.file && c.rarity === 'c');
        if (hasCommon) {
          const ov = document.createElement('div');
          ov.className = 'rarity-overlay ' + card.rarity;
          el.appendChild(ov);
        }
      }

      const cnt = dupeCounts[card.file + '|' + card.rarity] || 0;
      if (cnt > 1) {
        const db = document.createElement('div');
        db.className = 'dupe-badge';
        db.textContent = 'x' + cnt;
        el.appendChild(db);
      }
      grid.appendChild(el);
    });
  });
}

function setFilter(key, val, btn) {
  filters[key] = val;
  // reset active state for that row
  const rowId = { rarity:'rarityFilters', team:'teamFilters', league:'leagueFilters', pack:'packFilters' }[key];
  document.getElementById(rowId).querySelectorAll('.filter-btn').forEach(b => {
    b.className = 'filter-btn' + (b === btn ? ' on' : '');
  });
  render();
}

function clearCol() {
  if (confirm('Clear your entire collection?')) {
    sessionStorage.removeItem('ifiCol');
    try { document.cookie = 'ifiCol=; path=/; max-age=0'; } catch(e) {}
    render();
  }
}

function openLB(card) {
  const orient = card.landscape ? 'landscape' : 'portrait';
  document.getElementById('lbImg').src = cardImgSrc(card.packId, card.file);
  document.getElementById('lbImg').alt = card.name;
  document.getElementById('lbName').textContent = card.name + (card.position ? ' — ' + card.position : '');
  document.getElementById('lbTeam').textContent = card.team + ' · ' + (card.packName || '');
  const rar = document.getElementById('lbRarity');
  rar.textContent = RARITY_LABELS[card.rarity];
  rar.className = 'lb-rarity ' + card.rarity;
  document.getElementById('lbInner').className = 'lb-inner ' + orient + ' rarity-' + card.rarity;

  // overlay — only if common variant exists
  const lbOverlay = document.getElementById('lbOverlay');
  const packCards = (window.PACK_DATA || []).find(p => p.id === card.packId)?.cards || [];
  const hasCommon = packCards.some(c => c.file === card.file && c.rarity === 'c');
  if ((card.rarity === 'u' || card.rarity === 'r') && hasCommon) {
    lbOverlay.className = 'rarity-overlay ' + card.rarity;
    lbOverlay.style.display = '';
    lbOverlay.style.borderRadius = '14px';
  } else {
    lbOverlay.style.display = 'none';
  }

  document.getElementById('lightbox').classList.add('open');
}
function closeLB(e) {
  if (!e || e.target === document.getElementById('lightbox') || e.currentTarget.tagName === 'BUTTON')
    document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLB(); });

(async () => {
  try { await render(); } catch(e) { console.error('render error:', e); }
  try { await fetchCollectionFromServer(); } catch(e) { console.error('fetch error:', e); }
})();

// Re-fetch when user switches back to this tab
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) fetchCollectionFromServer().catch(() => {});
});
</script>
<script src="auth.js"></script>
</body>
</html>
