<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>50 Yard Cards – Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black:  #0a0d0a; --dark: #111410; --panel: #181c16;
    --border: #2a2e24; --silver: #8a9a80;
    --green:  #6b7c3f; --gold: #c8980a;
    --muted:  #5a6650; --text: #e8ece4; --white: #f0f0ee;
    --c-color: #6a6a76; --u-color: #3a7abf; --r-color: #9b42d6; --sr-color: #c8980a;
  }
  html, body { background: var(--black); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  nav {
    background: var(--dark); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 1.5rem;
  }
  .nav-logo { display:flex; align-items:center; height:80px;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.2rem;
    letter-spacing: 0.14em; color: var(--white); text-transform: uppercase;
    padding: 1rem 0; text-decoration: none;
  }
  .nav-logo span { color: var(--green); }

  .auth-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem;
  }
  .auth-box {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 2rem; width: 100%; max-width: 380px;
  }
  .auth-title {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.8rem;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--white);
    margin-bottom: 0.25rem;
  }
  .auth-title span { color: var(--green); }
  .auth-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.75rem; }

  /* tabs */
  .auth-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .auth-tab {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.82rem;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 0.6rem 1.25rem;
    border: none; background: transparent; color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.12s;
  }
  .auth-tab.active { color: var(--white); border-bottom-color: var(--green); }

  .auth-form { display: none; flex-direction: column; gap: 1rem; }
  .auth-form.active { display: flex; }

  label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); display: block; margin-bottom: 5px; }
  input[type="text"], input[type="email"], input[type="password"] {
    width: 100%; background: var(--dark); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.6rem 0.85rem; color: var(--white);
    font-family: 'Barlow', sans-serif; font-size: 0.9rem;
    transition: border-color 0.12s; outline: none;
  }
  input:focus { border-color: var(--green); }

  .btn-submit {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1rem;
    letter-spacing: 0.14em; text-transform: uppercase;
    background: var(--green); color: var(--white); border: none; border-radius: 6px;
    padding: 0.7rem; cursor: pointer; transition: background 0.12s, transform 0.1s;
    margin-top: 0.25rem;
  }
  .btn-submit:hover { background: #7a8f4a; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { background: #2a2a2e; color: var(--muted); cursor: default; transform: none; }

  .auth-error {
    background: rgba(107,124,63,0.15); border: 1px solid rgba(107,124,63,0.4);
    color: #f08080; font-size: 0.8rem; padding: 0.6rem 0.85rem; border-radius: 6px;
    display: none;
  }
  .auth-error.show { display: block; }

  footer { border-top: 1px solid var(--border); text-align: center; padding: 1.25rem; font-size: 0.7rem; color: var(--muted); }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo"><img src="50ydcards.png" alt="50 Yard Cards" style="height:88px;width:auto;display:block;filter:brightness(0) invert(1);"></a>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-title"><img src="50ydcards.png" alt="50 Yard Cards" style="height:88px;width:auto;margin-bottom:0.5rem;"></div>
    <div class="auth-sub">Sign in to save your collection across devices</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- LOGIN -->
    <form class="auth-form active" id="loginForm" onsubmit="doLogin(event)">
      <div class="auth-error" id="loginError"></div>
      <div>
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required>
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-submit" id="loginBtn">Sign In</button>
    </form>

    <!-- SIGNUP -->
    <form class="auth-form" id="signupForm" onsubmit="doSignup(event)">
      <div class="auth-error" id="signupError"></div>
      <div>
        <label>Username</label>
        <input type="text" id="signupUsername" placeholder="CoolUsername" required>
      </div>
      <div>
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" required>
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="At least 6 characters" required>
      </div>
      <button type="submit" class="btn-submit" id="signupBtn">Create Account</button>
    </form>
  </div>
</div>

<footer>50 Yard Cards Indoor Football Index &copy; 2025copy; 2025 · IFL Cards</footer>

<script>
// ── CONFIG ──
// Change this to your Worker URL after deploying the worker
const API = 'https://api.cards.indoorfootballindex.com';

async function migrateLocalToServer(token) {
  let local = [];
  try {
    let s = sessionStorage.getItem('ifiCol');
    if (s) local = JSON.parse(s);
    else {
      const m = document.cookie.split(';').find(c => c.trim().startsWith('ifiCol='));
      if (m) local = JSON.parse(decodeURIComponent(m.split('=')[1]));
    }
  } catch(e) {}
  if (!local.length) return;
  try {
    await fetch(API + '/api/collect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ cards: local })
    });
    sessionStorage.removeItem('ifiCol');
    try { document.cookie = 'ifiCol=; path=/; max-age=0'; } catch(e) {}
  } catch(e) {}
}

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0) === (tab === 'login'));
  });
  document.getElementById('loginForm').classList.toggle('active', tab === 'login');
  document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}
function hideError(id) {
  document.getElementById(id).classList.remove('show');
}

function saveAuth(token, username, email) {
  try {
    localStorage.setItem('ifiToken', token);
    localStorage.setItem('ifiUser', JSON.stringify({ username, email }));
  } catch(e) {}
}

async function doLogin(e) {
  e.preventDefault();
  hideError('loginError');
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';

  try {
    const res = await fetch(API + '/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value,
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    saveAuth(data.token, data.username, data.email);
    await migrateLocalToServer(data.token);
    window.location.href = 'index.html';
  } catch(e) {
    showError('loginError', e.message);
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function doSignup(e) {
  e.preventDefault();
  hideError('signupError');
  const btn = document.getElementById('signupBtn');
  btn.disabled = true; btn.textContent = 'Creating account…';

  try {
    const res = await fetch(API + '/api/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('signupEmail').value,
        username: document.getElementById('signupUsername').value,
        password: document.getElementById('signupPassword').value,
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Signup failed');
    saveAuth(data.token, data.username, data.email);
    await migrateLocalToServer(data.token);
    window.location.href = 'index.html';
  } catch(e) {
    showError('signupError', e.message);
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}

// If already logged in, redirect
try {
  const existingToken = localStorage.getItem('ifiToken');
  if (existingToken) window.location.href = 'index.html';
} catch(e) {}
</script>
</body>
</html>
